# this will deploy the safe/secure/tested app to prod server

name: Deploy to Server

on:
    workflow_call:

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
           - name: code checkout
             uses: actions/checkout@v4

           - name: SSH to Prod Server & create app folder
             uses: appleboy/ssh-action@v1.0.3
             with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }} 
                script: |
                  echo "Installing required packages & folders"
                  sudo apt update && sudo apt install docker.io docker-compose-v2 -y
                  sudo usermod -aG docker $USER  && newgrp docker
                  mkdir -p devOps
            
           - name: Copy the docker-compose file
             uses: appleboy/scp-action@v1
             with: 
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }} 
                source: docker-compose.yml
                target: ~/devops

           - name: Run the Application
             uses: appleboy/ssh-action@v1.0.3
             with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }} 
                script: |
                  echo "Running the application"
                  export DOCKERHUB_USERNAME=${{ vars.DOCKERHUB_USERNAME }}
                  export DOCKERHUB_TAG=${{ github.sha}}
                  echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ vars.DOCKERHUB_USERNAME }} --password-stdin
                  cd  ~/devops && docker compose down && docker compose up -d --build --force-recreate