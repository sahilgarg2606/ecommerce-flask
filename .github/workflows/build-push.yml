name: Build and Push Docker Image
on:
    workflow_call:

jobs:
    build-and-push:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
            
            - name: Login to Docker hub
              uses: docker/login-action@v2
              with:
                username: ${{vars.DOCKERHUB_USERNAME}}
                password: ${{secrets.DOCKERHUB_TOKEN }}
            - name: Build Image
              run: |
                docker build -t ${{vars.DOCKERHUB_USERNAME}}/ecommerce:latest .
            
            - name: Scan Image with trivy
              uses: aquasecurity/trivy-action@v0.2.0
              with:
                image-ref: ${{vars.DOCKERHUB_USERNAME}}/ecommerce:latest
                format: 'table'
                exit-code: '1'
                severity: 'CRITICAL'

            - name: Tag and Push Image
              run: |
                docker tag ${{vars.DOCKERHUB_USERNAME}}/ecommerce:latest ${{vars.DOCKERHUB_USERNAME}}/ecommerce:${{ github.sha }}
                docker push ${{vars.DOCKERHUB_USERNAME}}/ecommerce:latest
                docker push ${{vars.DOCKERHUB_USERNAME}}/ecommerce:${{ github.sha }}
